<body>

<!-- NAVBAR IGUAL AL INDEX -->

    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm navbar-custom">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center fw-bold" href="../index.html">
                <img src="../media/logo.png" width="40" class="me-2">
                VURA
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-uppercase small">

                    <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="../paginas/productos.html">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="../paginas/nosotros.html">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" href="../paginas/contacto.html">Contacto</a></li>
                    <li class="nav-item"><a class="nav-link" href="../paginas/blogs.html">Blogs</a></li>

                </ul>
            </div>

        </div>
    </nav>
</header>




<main class="producto-detalle-layout container">

    <!-- BREADCRUMB -->
    <nav class="breadcrumb-custom">
        <a href="../index.html">Inicio</a> / 
        <a href="../paginas/productos.html">Productos</a> / 
        <span id="breadcrumb-nombre"></span>
    </nav>


    <!-- BLOQUE PRINCIPAL -->
    <section class="detalle-principal">

        <div class="fila-detalle">

            <!-- GALERÍA -->
            <div class="producto-galeria">

                <div class="imagen-principal-wrapper">
                    <img id="img-principal" class="img-principal">
                </div>

                <div class="miniaturas" id="miniaturas"></div>

            </div>


            <!-- INFO PRODUCTO -->
            <div class="producto-info">

                <h1 id="nombre" class="producto-titulo"></h1>

                <p class="precio" id="precio"></p>

                <div class="descripcion-corta">
                    <p id="descripcion"></p>
                </div>

                <!-- CTA -->
                <div class="producto-accion">
                    <a href="https://wa.me" class="btn btn-lg mt-3">
                        Consultar por WhatsApp
                    </a>
                </div>

            </div>

        </div>

    </section>


    <!-- INFO EXTRA -->
    <section class="detalles-tecnicos mt-5">

        <div class="detalles-grid">

            <!-- INFO TECNICA -->
            <div class="detalle-card">
                <h3>Información Técnica</h3>
                <ul id="info-tecnica"></ul>
            </div>

            <!-- USO -->
            <div class="detalle-card">
                <h3>Consejos de Uso</h3>
                <p id="uso"></p>
            </div>

        </div>

    </section>


    <!-- RELACIONADOS -->
    <section class="relacionados mt-5">

        <h2>También te puede interesar</h2>

        <div id="relacionados" class="grilla-relacionados"></div>

    </section>

</main>

        <!--  Footer -->

        <footer class="footer-custom mt-5">
