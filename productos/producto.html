<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vura - Producto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TU CSS -->
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<!-- NAVBAR (copiada del index) -->
<header>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm navbar-custom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="../index.html">
                <img src="../logo.png" width="40" class="me-2">
                VURA
            </a>
        </div>
    </nav>
</header>


<!-- TU MAIN (esto que hiciste está perfecto) -->
<main class="producto-detalle-layout container">

    <nav class="breadcrumb-custom">
        <a href="../index.html">Inicio</a> / 
        <a href="../paginas/productos.html">Productos</a> / 
        <span id="breadcrumb-nombre"></span>
    </nav>

    <section class="detalle-principal">
        <div class="fila-detalle">

            <div>
                <img id="img-principal" class="img-principal">
                <div class="miniaturas" id="miniaturas"></div>
            </div>

            <div class="columna-info">
                <h1 id="nombre"></h1>
                <p class="precio" id="precio"></p>
                <p id="descripcion"></p>

                <a href="https://wa.me" class="btn btn-success mt-3">
                    Consultar por WhatsApp
                </a>
            </div>

        </div>
    </section>

    <section class="detalles-tecnicos mt-5">
        <div class="row">
            <div class="col-md-6">
                <h3>Información Técnica</h3>
                <ul id="info-tecnica"></ul>
            </div>

            <div class="col-md-6">
                <h3>Consejos de Uso</h3>
                <p id="uso"></p>
            </div>
        </div>
    </section>

</main>


<!-- FOOTER -->
<footer class="footer-custom mt-5">
    <div class="container text-center py-4">
        <p>&copy; 2024 Vura Bazar Natural</p>
    </div>
</footer>


<!-- JS -->
