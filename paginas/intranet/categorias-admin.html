<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Vura - Categorías

    </title>

    <link
        rel="icon"
        href="../../media/logo.png"
        type="image/png">


    <!-- BOOTSTRAP -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">


    <!-- CSS -->
    <link
        rel="stylesheet"
        href="../../css/general.css">

    <link
        rel="stylesheet"
        href="../../css/categorias-admin.css">

</head>

<body>


<!-- NAVBAR -->
<header>

    <nav
        class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm navbar-custom">

        <div class="container">

            <a
                class="navbar-brand fw-bold"
                href="../../index.html">

                VURA

            </a>


            <div class="ms-auto d-flex gap-2">

                <a
                    href="./dashboard-admin.html"
                    class="btn btn-outline-dark btn-sm">

                    Dashboard

                </a>

                <button
                    id="btn-logout"
                    class="btn btn-dark btn-sm">

                    Cerrar Sesión

                </button>

            </div>

        </div>

    </nav>

</header>



<!-- MAIN -->
<main class="categorias-main">


    <!-- HERO -->
    <section class="categorias-hero">

        <div class="container">

            <span class="admin-tag">

                Gestión Administrativa

            </span>

            <h1>

                Gestión de Categorías

            </h1>

            <p>

                Organiza y administra las categorías
                visibles dentro del catálogo Vura.

            </p>

        </div>

    </section>



    <!-- FORM -->
    <section class="categorias-form-section">

        <div class="container">

            <div class="categorias-form card-base">

                <h2>

                    Crear Categoría

                </h2>


                <form id="form-categoria">

                    <div class="mb-4">

                        <label
                            for="nombre-categoria"
                            class="form-label">

                            Nombre Categoría

                        </label>

                        <input
                            type="text"
                            id="nombre-categoria"
                            class="form-control"
                            maxlength="50"
                            required>

                    </div>


                    <button
                        type="submit"
                        class="btn btn-dark w-100">

                        Guardar Categoría

                    </button>

                </form>

            </div>

        </div>

    </section>



    <!-- LISTA -->
    <section class="categorias-lista-section">

        <div class="container">

            <div
                id="contenedor-categorias"
                class="categorias-grid">

            </div>

        </div>

    </section>

</main>



<!-- AUTH -->
<script src="../../js/auth/auth.js"></script>

<script src="../../js/auth/session.js"></script>

<script src="../../js/auth/guards.js"></script>


<!-- STORAGE -->
<script src="../../js/core/categorias-storage.js"></script>


<!-- JS -->
<script src="../../js/intranet/categorias-admin.js"></script>


<!-- GENERAL -->
<script src="../../js/general.js"></script>

<script src="../../js/modo-oscuro.js"></script>

</body>

</html>
