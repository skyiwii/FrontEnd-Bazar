<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vura - Contactos</title>

    <link rel="icon" href="../../media/logo.png" type="image/png">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="../../css/general.css">
    <link rel="stylesheet" href="../../css/contactos-admin.css">
</head>

<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm navbar-custom">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center fw-bold" href="../../index.html">
                <img src="../../media/logo.png" width="40" class="me-2" alt="Logo Vura">
                VURA
            </a>

            <button
                id="btn-menu"
                class="navbar-toggler"
                type="button"
                aria-label="Abrir menú">

                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">
                        <a class="nav-link" href="./dashboard-admin.html">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item ms-lg-3">
                        <button id="btn-logout" class="btn btn-dark btn-sm">
                            Cerrar Sesión
                        </button>
                    </li>

                </ul>
            </div>

        </div>
    </nav>
</header>


<main class="contactos-admin-main">

    <section class="contactos-hero">
        <div class="container">

            <span class="admin-tag">
                Administración
            </span>

            <h1>
                Mensajes de Contacto
            </h1>

            <p>
                Revisa, busca y administra los mensajes enviados desde contacto.html y el widget del inicio.
            </p>

        </div>
    </section>


    <section class="contactos-panel">
        <div class="container">

            <div class="contactos-toolbar card-base">

                <div>
                    <h2>
                        Bandeja de mensajes
                    </h2>

                    <p>
                        Gestiona dudas, consultas y solicitudes de clientes.
                    </p>
                </div>

                <div class="contactos-filtros">

                    <input
                        type="text"
                        id="buscador-contactos"
                        class="form-control"
                        placeholder="Buscar por nombre, correo o mensaje...">

                    <select
                        id="filtro-estado"
                        class="form-control">

                        <option value="todos">Todos</option>
                        <option value="pendiente">Pendientes</option>
                        <option value="respondido">Respondidos</option>
                        <option value="archivado">Archivados</option>

                    </select>

                </div>

            </div>

            <div id="contador-contactos" class="contador-contactos"></div>

            <div
                id="contenedor-contactos"
                class="contactos-grid">
            </div>

        </div>
    </section>

</main>


<footer class="footer-custom">
    <div class="container text-center py-4">
        <p class="mb-2">&copy; 2024 Vura Bazar Natural</p>
        <p class="small">Hecho en Chile</p>
    </div>
</footer>


<script src="../../js/auth/auth.js"></script>
<script src="../../js/auth/session.js"></script>
<script src="../../js/auth/guards.js"></script>

<script src="../../js/core/contactos-storage.js"></script>
<script src="../../js/intranet/contactos-admin.js"></script>

<script src="../../js/general.js"></script>
<script src="../../js/modo-oscuro.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
