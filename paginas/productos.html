<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vura - Productos</title>
    <link rel="icon" href="../media/logo.png" type="image/png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/productos.css">
</head>

<body>

<!-- NAVBAR -->
<header>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm navbar-custom">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center fw-bold" href="../index.html">
                <img src="../media/logo.png" width="40" class="me-2">
                VURA
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-uppercase small">

                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="#">Productos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="nosotros.html">Nosotros</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contacto.html">Contacto</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="blogs.html">Blogs</a>
                    </li>

                </ul>
            </div>

            <button id="btn-carrito" class="btn btn-dark ms-2">
                🛒 Carrito (<span id="contador-carrito">0</span>)
            </button>
            <button id="btn-tema" class="btn btn-outline-dark ms-2">🌙</button>

        </div>
    </nav>
</header>


<!-- CONTENIDO -->
<main class="container mt-5">

    <div class="productos-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar-filtros">

            <div class="filtro-categorias">
                <details open>
                    <summary>Categorías</summary>
                    <ul>
                        <li><a href="#">Frutas y Verduras</a></li>
                        <li><a href="#">Lácteos</a></li>
                        <li><a href="#">Panadería</a></li>
                        <li><a href="#">Cereales</a></li>
                        <li><a href="#">Bebidas</a></li>
                    </ul>
                </details>
            </div>

        </aside>

        <!-- PRODUCTOS -->
        <section class="productos-grilla">

            <div class="filtros mb-4 d-flex flex-wrap gap-3 align-items-center">
                <input type="text" id="buscador" class="form-control" placeholder="Buscar productos..." style="max-width:350px;">
                <select id="filtro-categoria" class="form-select" style="max-width:200px;">
                    <option value="todos">Todas las categorías</option>
                    <option value="aceites">Aceites Esenciales</option>
                    <option value="miel">Mieles</option>
                </select>
            </div>

            <div id="productos-container" class="row"></div>

        </section>

    </div>

</main>


<!-- FOOTER -->
<footer class="footer-custom mt-5">
    <div class="container text-center py-4">

        <p class="mb-2">&copy; 2024 Vura Bazar Natural</p>
        <p class="small">Hecho en Chile</p>

        <div class="mt-3">
            <a href="#" class="me-3 footer-link">Instagram</a>
            <a href="#" class="footer-link">WhatsApp</a>
        </div>

    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/productos.js"></script>
<script src="../js/theme.js"></script>

<!-- Modal del Carrito -->
<div id="modal-carrito" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h2>🛒 Tu Carrito</h2>
        <div id="items-carrito"></div>
        <hr>
        <h3>Total: $<span id="total-carrito">0</span></h3>
        
        <button onclick="vaciarCarrito()" class="btn btn-danger">Vaciar Carrito</button>
        <button onclick="cerrarModal()" class="btn btn-dark">Seguir Comprando</button>
    </div>
</div>

</body>
</html>
